name: iOS Build

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "API base URL (Vercel 등에 배포된 백엔드)"
        required: true
        default: "https://lolpago.vercel.app"
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (mobile, static export)
        env:
          NEXT_PUBLIC_API_BASE: ${{ inputs.api_base || 'https://lolpago.vercel.app' }}
        run: npm run build:mobile

      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned .app (debug)
        working-directory: ios/App
        # 이 단계는 코드 서명 없이 simulator/임시 빌드만 검증한다.
        # 실제 App Store 제출은 인증서/프로비저닝 프로파일 secrets 설정이 별도로 필요.
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolpago-ios-debug
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error
          retention-days: 7
