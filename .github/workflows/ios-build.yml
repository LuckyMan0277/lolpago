name: iOS Build

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "API base URL (Vercel 등에 배포된 백엔드)"
        required: true
        default: "https://lolpago.vercel.app"
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        # Use the runner's default Xcode (newest installed) so the iOS SDK
        # version matches an installed simulator runtime — actool requires this
        # even for device builds. Capacitor 8 needs Xcode 16+, which macos-15
        # satisfies by default.
        run: |
          ls /Applications | grep -E '^Xcode' || true
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (mobile, static export)
        env:
          NEXT_PUBLIC_API_BASE: ${{ inputs.api_base || 'https://lolpago.vercel.app' }}
        run: npm run build:mobile

      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            npx cap add ios
          else
            echo "iOS platform already present, skipping cap add"
          fi
          test -d ios/App/App.xcodeproj || { echo "::error::App.xcodeproj missing after cap add"; exit 1; }

      - name: Capacitor sync iOS
        # Capacitor 8은 SPM 기반. 의존성은 xcodebuild가 resolve 한다.
        run: npx cap sync ios

      - name: Build unsigned .app (device, debug)
        working-directory: ios/App
        # Device(iphoneos) 빌드 — 시뮬레이터 런타임 불필요. 코드 사인 없이 .app만 생성.
        # 실제 App Store 제출은 인증서/프로비저닝 프로파일 secrets 설정이 별도로 필요.
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolpago-ios-debug
          path: ios/App/build/Build/Products/Debug-iphoneos/App.app
          if-no-files-found: error
          retention-days: 7
