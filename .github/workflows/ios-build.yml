name: iOS Build & TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "API base URL (Vercel 등에 배포된 백엔드)"
        required: true
        default: "https://lolpago.vercel.app"

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (required by App Store)
        # Apple requires apps to be built with iOS 26 SDK (Xcode 26+) for
        # App Store Connect uploads as of April 2025. The runner's default
        # Xcode may be older — pick the newest 26.x explicitly.
        run: |
          echo "::group::Installed Xcodes"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          echo "::endgroup::"

          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Xcode 26.x not installed on this runner. App Store uploads require iOS 26 SDK."
            echo "Available Xcodes:"
            ls -d /Applications/Xcode*.app 2>/dev/null
            exit 1
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (mobile, static export)
        env:
          NEXT_PUBLIC_API_BASE: ${{ inputs.api_base }}
        run: npm run build:mobile

      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            npx cap add ios
          else
            echo "iOS platform already present"
          fi
          test -d ios/App/App.xcodeproj

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Setup code signing (Keychain + Provisioning Profile)
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Strip stray whitespace/newlines from secrets (a very common GitHub UI footgun)
          DIST_P12_PASSWORD=$(printf '%s' "$DIST_P12_PASSWORD" | tr -d '\r\n\t ' )
          KEYCHAIN_PASSWORD=$(printf '%s' "$KEYCHAIN_PASSWORD" | tr -d '\r\n\t ' )

          # Decode artifacts to temp files
          echo "$DIST_P12_BASE64" | base64 -d > /tmp/distribution.p12
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision

          # Diagnostic: file integrity + password validity
          echo "::group::P12 diagnostics"
          echo "Base64 length: ${#DIST_P12_BASE64}"
          echo "Password length: ${#DIST_P12_PASSWORD}"
          P12_SIZE=$(wc -c < /tmp/distribution.p12)
          echo "P12 size: $P12_SIZE bytes"
          HEAD=$(xxd -l 2 -p /tmp/distribution.p12)
          echo "P12 header: $HEAD (expect 3082 = ASN.1 SEQUENCE)"
          if [ "$HEAD" != "3082" ]; then
            echo "::error::P12 binary corrupted — base64 decode failed. Re-upload DIST_P12_BASE64 as a single line."
            exit 1
          fi

          # Verify password using openssl (try -legacy then modern)
          if openssl pkcs12 -in /tmp/distribution.p12 -nodes -out /tmp/distribution.pem -password pass:"$DIST_P12_PASSWORD" -legacy 2>/dev/null; then
            echo "P12 unlocked (-legacy provider)"
          elif openssl pkcs12 -in /tmp/distribution.p12 -nodes -out /tmp/distribution.pem -password pass:"$DIST_P12_PASSWORD" 2>/dev/null; then
            echo "P12 unlocked (default provider)"
          else
            echo "::error::P12 password does not match. Re-register DIST_P12_PASSWORD without trailing newline/spaces."
            exit 1
          fi
          echo "::endgroup::"

          # Re-package as modern PKCS12 so macOS Security framework accepts it
          # (raw OpenSSL 3 -legacy output sometimes triggers 'Unknown format in import')
          REPACK_PWD=$(openssl rand -base64 16 | tr -d '/+=' | head -c 24)
          openssl pkcs12 -export -in /tmp/distribution.pem -out /tmp/distribution-repack.p12 -password pass:"$REPACK_PWD"
          rm /tmp/distribution.pem
          mv /tmp/distribution-repack.p12 /tmp/distribution.p12
          DIST_P12_PASSWORD="$REPACK_PWD"
          echo "P12 repackaged (modern PBES2)"

          # Extract UUID and Name from profile for later use
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract Name raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "Profile: $PROFILE_NAME ($PROFILE_UUID)"

          # Install provisioning profile to standard location
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          # Create dedicated keychain (so we don't pollute the runner's default)
          KEYCHAIN=build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          # Import distribution certificate (explicit format avoids 'Unknown format')
          security import /tmp/distribution.p12 -k "$KEYCHAIN" -P "$DIST_P12_PASSWORD" -f pkcs12 -t agg -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" | grep -v 'partition list' || true
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Wipe decoded files from disk
          rm /tmp/distribution.p12

      - name: Build & Archive (Release, signed)
        working-directory: ios/App
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER=com.lolpago.app \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            archive

      - name: Export IPA (App Store)
        working-directory: ios/App
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/propertylist-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.lolpago.app</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist
          ls -la build/ipa

      - name: Upload to TestFlight via altool
        env:
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # altool looks for AuthKey_<KEYID>.p8 in one of these standard dirs
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APPSTORE_API_KEY_BASE64" | base64 -d > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

          IPA=$(ls ios/App/build/ipa/*.ipa | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

      - name: Upload IPA artifact (debug copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lolpago-ios-ipa
          path: ios/App/build/ipa/*.ipa
          if-no-files-found: warn
          retention-days: 7

      - name: Cleanup (keychain + private key)
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f "$HOME/.appstoreconnect/private_keys"/AuthKey_*.p8 || true
